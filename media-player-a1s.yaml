#### led connect between pin 22 and 3.3v ###

substitutions:

  name: bush-a1s
  friendly_name: Bush-a1s 
  
  ota_password: "somthing"
  key_encryption: "something"
  task: "true"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - select.set:
          id: dac_output_select
          option: "BOTH"

esp32:
  board: esp-wrover-kit
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: ${key_encryption}

ota:
  - platform: esphome
    password: ${ota_password}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-A1S Fallback Hotspot"
    password: !secret ap_password

captive_portal:

psram:
  ignore_not_found: false 

# ===== ES8388 Audio Codec Configuration =====
# Reference: https://esphome.io/components/audio_dac/es8388/

i2c:
  sda: GPIO33
  scl: GPIO32
  frequency: 100kHz
  id: bus_a

audio_dac:
  - platform: es8388
    id: es8388_dac

select:
  - platform: es8388
    es8388_id: es8388_dac
    dac_output:
      id: dac_output_select
      name: "DAC Output"
    adc_input_mic:
      name: "ADC Input MIC"

i2s_audio:
  id: i2s_output
  i2s_lrclk_pin: GPIO25
  i2s_bclk_pin: GPIO27
  i2s_mclk_pin: GPIO0

# ===== Amplifier Control =====
switch:
  - platform: gpio
    pin: GPIO21
    id: mute_switch
    name: "AMP Switch"
    restore_mode: ALWAYS_ON

  - platform: restart
    name: Reboot
    id: reboot

sensor:
  - platform: wifi_signal
    name: WiFi
    update_interval: 60s 

# ===== Microphone =====
microphone:
  - platform: i2s_audio
    i2s_din_pin: GPIO35
    id: mic1
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit

# ===== Hardware Buttons & Sensors =====
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
      mode:
        input: true
    name: "Jack Status"

  - platform: gpio
    pin:
      number: GPIO036
      inverted: true
    name: "Key 1"
    filters:
      - delayed_off: 10ms

  - platform: gpio
    pin:
      number: GPIO013
      inverted: true
    name: "Key 2"
    filters:
      - delayed_off: 10ms

  - platform: gpio
    pin:
      number: GPIO019
      inverted: true
    name: "Key 3"
    filters:
      - delayed_off: 10ms

  - platform: gpio
    pin:
      number: GPIO023
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Key 4"
    filters:
      - delayed_off: 10ms

  - platform: gpio
    pin:
      number: GPIO018
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Key 5"
    filters:
      - delayed_off: 10ms

  - platform: gpio
    pin:
      number: GPIO005
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Key 6"
    filters:
      - delayed_off: 10ms

# ===== Status LED =====
output:
  - platform: ledc
    pin:
      number: GPIO22
      inverted: true
    id: output_led

light:
  - platform: binary
    name: LED
    id: red_led
    output: output_led
    restore_mode: ALWAYS_OFF

# --- SendSpin & Media Player Logic (Standard) ---
# ===== Sendspin External Components =====
# Using commit 9148832 for audio to avoid include_builtin_idf_component issue
external_components:
  - source:
      type: git
      url: https://www.github.com/esphome/esphome
      ref: dev
    components: [sendspin]

# ===== Speaker & Audio Pipeline =====
speaker:
  - platform: i2s_audio
    i2s_audio_id: i2s_output
    sample_rate: 48000
    id: i2s_speaker_id
    i2s_dout_pin: GPIO26
    bits_per_sample: 32bit
    dac_type: external
    channel: mono
    timeout: never
    buffer_duration: 100ms
    audio_dac: es8388_dac

  - platform: mixer
    id: mixing_speaker
    output_speaker: i2s_speaker_id
    num_channels: 2
    task_stack_in_psram: ${task}
    source_speakers:
      - id: announcement_mixer_input
        timeout: never
      - id: media_mixing_input
        timeout: never

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixer_input
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

http_request:

# ===== Sendspin Media Player =====
sendspin:
  id: sendspin_hub
  task_stack_in_psram: false

media_source:
  - platform: audio_http
    id: http_announcement_source
    buffer_size: 250000
  - platform: audio_http
    id: http_media_source
    buffer_size: 500000
  - platform: sendspin
    id: sendspin_media_source
    fixed_delay: 480 microseconds  # The AIC3204 DAC used, as configured, on the VPE delays audio by 480 microseconds

media_player:
  - platform: speaker_source
    name: Player
    id: external_media_player
    volume_min: 0.4
    volume_max: 1.0

    announcement_pipeline:
      format: FLAC     # FLAC is the least processor intensive codec
      num_channels: 1  # Stereo audio is unnecessary for announcements
      sample_rate: 48000
      speaker: announcement_resampling_speaker
      sources:
        - http_announcement_source
    media_pipeline:
      format: FLAC     # FLAC is the least processor intensive codec
      num_channels: 2
      sample_rate: 48000
      speaker: media_resampling_speaker
      sources:
        - http_media_source
        - sendspin_media_source

    on_play:               
        then:
        - light.turn_on:
            id: red_led
    on_idle:              
        then:
        - light.turn_off:
            id: red_led   

    on_announcement:
        then:
        - mixer_speaker.apply_ducking:
            id: media_mixing_input
            decibel_reduction: 20
            duration: 0.0s

    on_state:
      if:
        condition:
          and:
            - lambda: return (!id(announcement_triggered));
            - not:
                media_player.is_announcing: external_media_player
        then:
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 0
              duration: 1.0s

globals:
  - id: current_volume
    type: float
    initial_value: '0.2'
  - id: announcement_triggered
    type: bool
    initial_value: 'false'

# ===== Track Metadata (Optional) =====
text_sensor:
  - platform: sendspin
    type: title
    name: Track Title

  - platform: sendspin
    type: artist
    name: Artist

  - platform: sendspin
    type: album
    name: Album

  - platform: sendspin
    type: year
    name: Year

  - platform: sendspin
    type: track
    name: Track Number

  - platform: wifi_info
    ip_address:
      name: Device IP Address
    #  address_0:
     #    name: Device IP Address 0
    ssid:
      name: Device Connected SSID
 # bssid:
 #   name: Device Connected BSSID
 # mac_address:
 #   name: Device Mac Wifi Address
    scan_results:
      name: Device Latest Scan Results
#  dns_address:
 #   name: Device DNS Address
    power_save_mode:
      name: Device Wifi Power Save Mode

